<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | JualBeli.app</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
   <link rel="stylesheet" href="/style.css">
</head>
<body>
    <aside class="sidebar glass">
        <div class="logo"><h2><i class="fa-solid fa-store"></i> JualBeli</h2></div>
        <nav>
            <a href="/beranda"><i class="fa-solid fa-house"></i> Beranda</a>
            <a href="#"><i class="fa-solid fa-bolt"></i> Flash Sale</a>
            <a href="#"><i class="fa-solid fa-list"></i> Kategori</a>
            <a href="/akun/dasbor" class="active" id="menu-jualan"><i class="fa-solid fa-store"></i> Toko Saya</a>
        </nav>
        <div class="bottom-actions">
            <button id="theme-toggle" class="glass-btn"><i class="fa-solid fa-moon"></i> Tema</button>
        </div>
    </aside>

    <main class="content">
        <header class="top-header glass" style="position: relative; z-index: 9999;">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Cari barang wishlist...">
                <button class="search-btn">Cari</button>
            </div>
            <div class="header-actions">
                <a href="#" class="icon-btn"><i class="fa-solid fa-bell"></i></a>
                <a href="/transaksi/keranjang" class="icon-btn"><i class="fa-solid fa-cart-shopping"></i></a>
                <a href="/akun/dasbor" class="user-profile" style="text-decoration: none; color: inherit;">
                    <img src="https://ui-avatars.com/api/?name=User&background=4facfe&color=fff" alt="User" class="avatar">
                    <span id="user-name">Memuat...</span>
                </a>
            </div>
        </header>

        <section class="profile-container">
            <div class="profile-sidebar glass fade-in">
                <div class="profile-avatar">
                    <img src="https://ui-avatars.com/api/?name=User&background=4facfe&color=fff&size=100" alt="Avatar">
                    <span class="role-badge member"><i class="fa-solid fa-medal"></i> Member Pro</span>
                </div>
                <h2 style="text-align: center; margin: 10px 0;">Memuat...</h2>
                <p style="text-align: center; opacity: 0.7; margin-bottom: 20px;">Memuat data...</p>
                
                <div class="profile-menus">
                    <a href="/akun/dasbor" class="glass-btn" style="text-decoration: none;"><i class="fa-solid fa-clipboard-list"></i> Pesanan / Toko</a>
                    <a href="/akun/favorit" class="glass-btn active" style="text-decoration: none;"><i class="fa-solid fa-heart"></i> Wishlist</a>
                    <a href="/akun/pengaturan" class="glass-btn" style="text-decoration: none;"><i class="fa-solid fa-gear"></i> Pengaturan Akun</a>
                    <a href="#" class="glass-btn" style="color: #ef4444; text-decoration: none;"><i class="fa-solid fa-right-from-bracket"></i> Keluar</a>
                </div>
            </div>

            <div class="profile-main glass fade-in" style="animation-delay: 0.2s;">
                <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-heart" style="color: #ef4444;"></i> Barang Impianmu</h2>
                
                <section id="wishlist-grid" class="product-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                    <p style="opacity: 0.6; padding: 20px;">Belum ada barang di wishlist Anda.</p>
                </section>
            </div>
        </section>
    </main>
    <div id="toast-container"></div>
    <script src="/script.js"></script>
</body>
</html>
