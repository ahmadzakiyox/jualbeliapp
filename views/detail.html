<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk | JualBeli.app</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <aside class="sidebar glass">
        <div class="logo">
            <h2><i class="fa-solid fa-store" style="color: #8b5cf6;"></i> JualBeli</h2>
        </div>
        <nav>
            <a href="/beranda"><i class="fa-solid fa-house" style="color: #3b82f6;"></i> Beranda</a>
            <a href="#"><i class="fa-solid fa-bolt" style="color: #f59e0b;"></i> Flash Sale</a>
            <a href="#" class="active"><i class="fa-solid fa-list" style="color: #10b981;"></i> Kategori</a>
            <a href="/akun/dasbor" id="menu-jualan" style="display: none;"><i class="fa-solid fa-shop" style="color: #ec4899;"></i> Toko Saya</a>
        </nav>
        <div class="bottom-actions">
            <button id="theme-toggle" class="glass-btn"><i class="fa-solid fa-moon"></i> Tema</button>
        </div>
    </aside>

    <main class="content">
        
        <header class="top-header glass" style="position: relative; z-index: 9999;">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Cari produk lain...">
                <button class="search-btn">Cari</button>
            </div>
            <div class="header-actions">
                <a href="#" class="icon-btn"><i class="fa-solid fa-bell"></i></a>
                <a href="/transaksi/keranjang" class="icon-btn"><i class="fa-solid fa-cart-shopping"></i></a>
                <a href="/akun/dasbor" class="user-profile" style="text-decoration: none; color: inherit;">
                    <img src="https://ui-avatars.com/api/?name=Guest&background=4facfe&color=fff" alt="User" id="user-avatar" class="avatar">
                </a>
            </div>
        </header>

        <div class="page-header" style="margin-bottom: 30px;">
            <a href="/beranda" class="glass-btn" style="display: inline-flex; width: auto; padding: 10px 20px; border-radius: 20px;"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
        </div>

       <section class="detail-container">
            <div id="loading-detail" style="width: 100%; text-align: center; padding: 80px; grid-column: 1 / -1;">
                <i class="fa-solid fa-spinner fa-spin fa-3x" style="color: var(--accent-color);"></i>
                <p style="margin-top: 20px; font-weight: bold;">Mencari data produk...</p>
            </div>

            <div id="content-detail" style="display: none; width: 100%; gap: 40px; align-items: start;">
                <div class="detail-image glass fade-in" id="detail-image" style="overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
                </div>

                <div class="detail-info glass fade-in" style="animation-delay: 0.2s; padding: 35px; border-radius: 24px;">
                    <div class="seller-badge" style="position: static; display: inline-block; margin-bottom: 15px;"><i class="fa-solid fa-shield-check"></i> Digital Terverifikasi</div>
                    
                    <p id="detail-kategori" style="color: var(--accent-color); font-weight: bold; margin-bottom: 5px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px;"></p>
                    <h1 class="detail-title" id="detail-title" style="line-height: 1.3;">Memuat Judul...</h1>
                    
                    <div class="detail-meta" style="margin: 15px 0; padding-bottom: 15px; border-bottom: 1px dashed var(--glass-border);">
                        <span class="rating" style="background: rgba(245, 158, 11, 0.1); padding: 5px 10px; border-radius: 8px;"><i class="fa-solid fa-star"></i> 5.0 (Review)</span>
                        <span class="stock" id="detail-stock" style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 5px 10px; border-radius: 8px; font-weight: bold;">Stok: ...</span>
                    </div>
                    
                    <h2 class="detail-price" id="detail-price" style="font-size: 2.8rem; text-shadow: 0 4px 10px rgba(79, 172, 254, 0.3);">Rp 0</h2>
                    
                    <div class="detail-description" style="background: rgba(0,0,0,0.03); padding: 20px; border-radius: 16px; margin-bottom: 25px;">
                        <h3 style="margin-bottom: 15px; border-bottom: 2px solid var(--accent-color); display: inline-block; padding-bottom: 5px;"><i class="fa-solid fa-circle-info"></i> Deskripsi Produk</h3>
                        <p id="detail-desc" style="white-space: pre-wrap; line-height: 1.8; opacity: 0.9;">Memuat deskripsi...</p>
                    </div>

                    <div class="seller-card glass" style="border-radius: 16px;">
                        <img src="https://ui-avatars.com/api/?name=Penjual&background=8b5cf6&color=fff" style="width: 50px; height: 50px; border-radius: 50%;" alt="Store">
                        <div>
                            <h4 id="detail-seller" style="font-size: 1.1rem;">Memuat Penjual...</h4>
                            <p><i class="fa-solid fa-certificate" style="color: #10b981;"></i> Penjual Pro Terpercaya</p>
                        </div>
                    </div>

                    <div class="action-buttons" style="margin-top: 30px;">
                        <button class="glass-btn primary tambah-keranjang-btn" style="width: 100%; font-size: 1.15rem; padding: 18px; border-radius: 16px; box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);">
                            <i class="fa-solid fa-cart-arrow-down" style="margin-right: 10px;"></i> Masukkan Keranjang
                        </button>
                        <button class="glass-btn tambah-wishlist-btn" style="width: auto; padding: 18px; border-radius: 16px;" title="Tambah ke Wishlist">
                            <i class="fa-solid fa-heart" style="color: #ef4444; font-size: 1.2rem;"></i>
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <nav class="mobile-nav glass">
        <a href="/beranda"><i class="fa-solid fa-house"></i></a>
        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="/transaksi/keranjang"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="/akun/dasbor"><i class="fa-solid fa-user"></i></a>
    </nav>

    <div id="toast-container"></div>
    <script src="/script.js"></script>
</body>
</html>
