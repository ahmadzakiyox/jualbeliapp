<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JualBeli.app - Katalog Produk Digital</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/">JualBeli.app</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Beranda</a></li>
          <li class="nav-item"><a class="nav-link" href="#catalog">Katalog</a></li>
          <li class="nav-item"><a class="nav-link" href="/api/admin/dashboard">Admin API</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="py-5 bg-primary text-white">
    <div class="container text-center">
      <h1 class="display-6 fw-bold">Marketplace Produk Digital</h1>
      <p class="lead mb-0">Lisensi software, akun premium, dan file PDF — instant delivery setelah pembayaran QRIS.</p>
    </div>
  </header>

  <main class="container py-4" id="catalog">
    <div class="d-flex flex-column flex-md-row gap-2 justify-content-between mb-3">
      <h2 class="h4 mb-0">Katalog Produk</h2>
      <input id="searchInput" class="form-control w-100 w-md-25" style="max-width:320px" placeholder="Cari produk..." />
    </div>

    <div id="productGrid" class="row g-3">
      <div class="col-12"><div class="alert alert-info">Memuat produk...</div></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/store.js"></script>
</body>
</html>
